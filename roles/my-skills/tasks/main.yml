

- name: clone skill repos
  git:
    repo: "{{ item.repo }}"
    dest: "/Users/{{ user }}/.my-skills/{{ item.dest }}"
    # Does not pull if already exists by default, refresh with `-e skills_git_update=true`
    update: "{{ skills_git_update }}"
    # Local modifications from below disable-model-invocation tweaks
    force: true
  loop: "{{ skill_repos }}"
  tags:
    - skills

- name: ensure tool specific skills parent dirs exist
  file:
    path: "/Users/{{ user }}/{{ item.folder }}/skills"
    state: directory
  loop: "{{ skill_tools }}"
  tags:
    - skills

- name: link skills
  file:
    # src:  "/Users/{{ user }}/.my-skills/{{ item[0][0].dest }}/{{ item[0][1].src_path }}"
    path: "/Users/{{ user }}/{{ item[1].folder }}/skills/{{ item[0][1].name }}"
    #state: link
    state: absent
  loop: "{{ skill_repos | subelements('skills') | product(skill_tools) | list }}"
  loop_control:
    label: "~/{{ item[0][0].dest }}/{{ item[0][1].name }} -> {{ item[1].folder }}"
  tags:
    - skills

# Fix IngmarKrusch/agentic casing
- name: fix file
  command: mv {{ item }} {{ item | replace('skill.md', 'SKILL.md') }}
  loop:
    - /Users/{{ user }}/.my-skills/agentic/skills/interview/skill.md
  tags: fix-skills


- name: "Inject 'disable-model-invocation: true' into SKILL.md frontmatter"
  lineinfile:
    path: "/Users/{{ user }}/.my-skills/{{ item[0].dest }}/{{ item[1].src_path }}/SKILL.md"
    regexp: "^disable-model-invocation:"
    insertafter: "^---$"
    firstmatch: true
    line: "disable-model-invocation: true"
    state: present
  loop: "{{ skill_repos | subelements('skills') }}"
  loop_control:
    label: "{{ item[1].name }}"
  when: item[1].name in skills_disable_model_invocation
  tags:
    - skills

# subelements('skills') flattens repo→skills into pairs:
# [repo_agentic, skill_interview]
# [repo_slidev,  skill_slidev]
#
# product(skill_tools) creates cartesian product:
# [[repo_agentic, skill_interview], tool_cursor]
# [[repo_agentic, skill_interview], tool_opencode]
# [[repo_slidev,  skill_slidev],    tool_cursor]
# [[repo_slidev,  skill_slidev],    tool_opencode]
#
# So item is always [subelements_pair, tool]:
# item[0]    → [repo, skill]
# item[0][0] → repo
# item[0][1] → skill
# item[1]    → tool
