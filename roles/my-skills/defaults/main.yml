skills_git_update: false

skill_repos:
  - repo: git@github.com:IngmarKrusch/agentic.git
    dest: "agentic"
    skills:
      - name: interview
        src_path: "skills/interview"
  - repo: git@github.com:znorris/claude-marketplace.git
    dest: "znorris-atlassian"
    skills:
      - name: jira-cli
        src_path: "plugins/atlassian-tools/skills/jira-cli"

skill_tools:
  # The .agents/skills/ paths have emerged as a widely-adopted convention for cross-client skill sharing. 
  # While the Agent Skills specification does not mandate where skill directories live (it only defines what goes inside them), scanning .agents/skills/ means skills installed by other compliant clients are automatically visible to yours, and vice versa.
  - folder: .agents
  - folder: .cursor
  - folder: .opencode

# Skills whose SKILL.md frontmatter should have 'disable-model-invocation: true' injected.
# Values must match a name under skill_repos[*].skills[*].name.
skills_disable_model_invocation:
  - interview
  - jira-cli
